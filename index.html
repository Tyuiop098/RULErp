<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>กฎระเบียบเซิร์ฟเวอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    background:#f1f5f9;
    overflow:hidden;
}

/* หน้าแรก */

.home{
    width:100%;
    height:100vh;
    background:
    linear-gradient(135deg,#38bdf8,#60a5fa,#818cf8);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
    position:relative;
    overflow:hidden;
}

.circle1{
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    top:-80px;
    right:-80px;
}

.circle2{
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    bottom:-70px;
    left:-70px;
}

.logo{
    width:130px;
    height:130px;
    border-radius:35px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    z-index:2;
}

.home h1{
    margin-top:25px;
    color:white;
    font-size:42px;
    font-weight:700;
    z-index:2;
}

.home p{
    margin-top:12px;
    color:#eff6ff;
    font-size:18px;
    z-index:2;
    line-height:1.6;
}

.enter-btn{
    margin-top:35px;
    width:100%;
    max-width:330px;
    padding:18px;
    border:none;
    border-radius:18px;
    background:white;
    color:#2563eb;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    z-index:2;
}

.enter-btn:active{
    transform:scale(0.96);
}

/* หน้ากฎ */

.rules-page{
    position:fixed;
    top:0;
    left:100%;
    width:100%;
    height:100vh;
    background:#f8fafc;
    transition:0.5s;
    overflow-y:auto;
}

.rules-page.active{
    left:0;
}

.topbar{
    position:sticky;
    top:0;
    background:white;
    padding:18px;
    display:flex;
    align-items:center;
    gap:15px;
    box-shadow:0 2px 15px rgba(0,0,0,0.08);
    z-index:999;
}

.back-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:14px;
    background:#e0f2fe;
    color:#0284c7;
    font-size:22px;
    cursor:pointer;
}

.topbar h2{
    color:#0f172a;
    font-size:24px;
}

.rules-container{
    padding:18px;
}

/* การ์ดกฎ */

.rule-card{
    background:white;
    border-radius:24px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 5px 18px rgba(0,0,0,0.06);
    transition:0.3s;
}

.rule-card:active{
    transform:scale(0.98);
}

.rule-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:15px;
}

.rule-number{
    background:#dbeafe;
    color:#2563eb;
    padding:8px 16px;
    border-radius:12px;
    font-weight:700;
    font-size:18px;
}

.rule-title{
    color:#0f172a;
    font-size:20px;
    font-weight:700;
    margin-bottom:12px;
}

.rule-detail{
    color:#475569;
    line-height:1.7;
    font-size:16px;
    margin-bottom:18px;
}

.punishment{
    display:inline-block;
    padding:10px 18px;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
}

.light{
    background:#fef3c7;
    color:#92400e;
}

.medium{
    background:#fed7aa;
    color:#9a3412;
}

.heavy{
    background:#fecaca;
    color:#991b1b;
}

</style>
</head>

<body>

<!-- หน้าแรก -->

<div class="home">

    <div class="circle1"></div>
    <div class="circle2"></div>

    <div class="logo">
        ⚖️
    </div>

    <h1>SERVER RULES</h1>

    <p>
        ระบบกฎระเบียบและบทลงโทษภายในเซิร์ฟเวอร์<br>
        กรุณาศึกษาก่อนเข้าเล่น
    </p>

    <button class="enter-btn" onclick="openRules()">
        ดูกฎระเบียบในแมพ
    </button>

</div>

<!-- หน้ากฎ -->

<div class="rules-page" id="rulesPage">

    <div class="topbar">

        <button class="back-btn" onclick="closeRules()">
            ←
        </button>

        <h2>กฎระเบียบเซิร์ฟเวอร์</h2>

    </div>

    <div class="rules-container" id="rulesContainer"></div>

</div>

<script>

const rules = [

{
title:"ห้ามใช้คำหยาบรุนแรง",
detail:"ห้ามด่าทอ เหยียด หรือใช้ถ้อยคำไม่เหมาะสมใส่ผู้เล่นคนอื่น รวมถึงการก่อกวนผ่านแชทหรือไมค์",
level:"เบา"
},

{
title:"ห้ามสแปมข้อความ",
detail:"ห้ามส่งข้อความซ้ำหลายครั้ง หรือใช้คำสั่งถี่เกินไปจนรบกวนผู้เล่นคนอื่น",
level:"เบา"
},

{
title:"ห้ามใช้อาวุธใน Safe Zone",
detail:"พื้นที่ปลอดภัยห้ามใช้อาวุธ ยิง หรือก่อเหตุรุนแรงทุกกรณี",
level:"กลาง"
},

{
title:"ห้ามยิงมั่ว",
detail:"การยิงผู้เล่นโดยไม่มีเหตุ RP หรือไม่มีเหตุผลถือว่าผิดกฎ",
level:"กลาง"
},

{
title:"ห้ามใช้โปรแกรมโกง",
detail:"ห้ามใช้ Hack Script Executor หรือโปรแกรมช่วยเล่นทุกชนิด",
level:"หนัก"
},

{
title:"ห้ามแอบอ้างทีมงาน",
detail:"ห้ามปลอมตัวเป็นแอดมิน ครูฝึก หรือทีมงานเซิร์ฟเวอร์",
level:"หนัก"
},

{
title:"ห้ามก่อกวนการฝึก",
detail:"ห้ามเดินป่วน วิ่งตัดแถว เปิดเสียงดัง หรือทำให้การฝึกเสียหาย",
level:"กลาง"
},

{
title:"ห้าม AFK ระหว่างกิจกรรม",
detail:"ผู้เล่นที่เข้าร่วมกิจกรรมหรือฝึกต้องอยู่หน้าจอตลอดเวลา",
level:"เบา"
},

{
title:"ห้ามแจกข้อมูลส่วนตัว",
detail:"ห้ามเผยแพร่ข้อมูลส่วนตัวของผู้อื่นโดยไม่ได้รับอนุญาต",
level:"หนัก"
},

{
title:"คำตัดสินทีมงานถือเป็นสิ้นสุด",
detail:"ผู้เล่นต้องเคารพคำตัดสินของทีมงานและห้ามเถียงอย่างรุนแรง",
level:"กลาง"
}

];

const container = document.getElementById("rulesContainer");

rules.forEach((rule,index)=>{

let className = "";
let punishmentText = "";

if(rule.level === "เบา"){
    className = "light";
    punishmentText = "โทษ : เตือน";
}

else if(rule.level === "กลาง"){
    className = "medium";
    punishmentText = "โทษ : ปลด";
}

else{
    className = "heavy";
    punishmentText = "โทษ : แบน";
}

container.innerHTML += `

<div class="rule-card">

    <div class="rule-header">

        <div class="rule-number">
            ข้อ ${index + 1}
        </div>

        <div class="punishment ${className}">
            ${punishmentText}
        </div>

    </div>

    <div class="rule-title">
        ${rule.title}
    </div>

    <div class="rule-detail">
        ${rule.detail}
    </div>

</div>

`;

});

function openRules(){
    document.getElementById("rulesPage").classList.add("active");
}

function closeRules(){
    document.getElementById("rulesPage").classList.remove("active");
}

</script>

</body>
</html>
