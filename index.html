<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>กฎระเบียบเซิร์ฟเวอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#111827);
    overflow:hidden;
}

/* หน้าแรก */

.home{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
    position:relative;
}

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:#38bdf8;
    filter:blur(180px);
    opacity:0.2;
    border-radius:50%;
}

.home h1{
    font-size:70px;
    z-index:2;
    text-shadow:0 0 20px #38bdf8;
}

.home p{
    margin-top:10px;
    color:#cbd5e1;
    font-size:20px;
    z-index:2;
}

.enter-btn{
    margin-top:35px;
    padding:18px 45px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#0ea5e9,#38bdf8);
    color:white;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 25px rgba(56,189,248,0.5);
    z-index:2;
}

.enter-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 40px rgba(56,189,248,0.8);
}

/* หน้ากฎ */

.rules-page{
    position:absolute;
    top:0;
    left:100%;
    width:100%;
    height:100vh;
    background:#0f172a;
    overflow-y:auto;
    padding:40px;
    transition:1s;
}

.rules-page.active{
    left:0;
}

.rules-title{
    text-align:center;
    color:white;
    margin-bottom:40px;
}

.rules-title h1{
    font-size:50px;
    color:#38bdf8;
}

.rules-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.rule-card{
    background:rgba(30,41,59,0.8);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:25px;
    color:white;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.rule-card:hover{
    transform:translateY(-8px);
    border-color:#38bdf8;
    box-shadow:0 0 30px rgba(56,189,248,0.3);
}

.rule-number{
    font-size:24px;
    color:#38bdf8;
    font-weight:700;
    margin-bottom:15px;
}

.rule-text{
    font-size:18px;
    line-height:1.6;
    margin-bottom:20px;
}

.punishment{
    display:inline-block;
    padding:10px 18px;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
}

.light{
    background:#eab308;
    color:black;
}

.medium{
    background:#f97316;
}

.heavy{
    background:#ef4444;
}

.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    padding:12px 25px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.back-btn:hover{
    background:#38bdf8;
}

</style>
</head>

<body>

<!-- หน้าแรก -->

<div class="home" id="home">

    <div class="glow"></div>

    <h1>SERVER RULES</h1>

    <p>กฎระเบียบและบทลงโทษภายในแมพ</p>

    <button class="enter-btn" onclick="openRules()">
        ดูกฎระเบียบในแมพ
    </button>

</div>

<!-- หน้ากฎ -->

<div class="rules-page" id="rulesPage">

    <button class="back-btn" onclick="backHome()">
        ← กลับ
    </button>

    <div class="rules-title">
        <h1>กฎระเบียบเซิร์ฟเวอร์</h1>
    </div>

    <div class="rules-grid" id="rulesContainer"></div>

</div>

<script>

const rules = [

{ text:"ห้ามใช้คำหยาบรุนแรงใส่ผู้อื่น", level:"เบา"},
{ text:"ห้ามสแปมข้อความในแชท", level:"เบา"},
{ text:"ห้ามเปิดไมค์ก่อกวน", level:"เบา"},
{ text:"ห้ามแต่งชุดผิดหน่วย", level:"เบา"},
{ text:"ห้ามขับรถชนเล่น", level:"เบา"},
{ text:"ห้ามใช้อาวุธใน Safe Zone", level:"กลาง"},
{ text:"ห้ามยิงมั่ว", level:"กลาง"},
{ text:"ห้ามแอบอ้างยศ", level:"กลาง"},
{ text:"ห้ามก่อกวนการฝึก", level:"กลาง"},
{ text:"ห้ามฝ่าฝืนคำสั่งครูฝึก", level:"กลาง"},
{ text:"ห้ามใช้บัคในเกม", level:"หนัก"},
{ text:"ห้ามใช้โปรแกรมโกง", level:"หนัก"},
{ text:"ห้ามปลอมเป็นแอดมิน", level:"หนัก"},
{ text:"ห้ามซื้อขายยศ", level:"หนัก"},
{ text:"ห้ามเหยียดผู้อื่น", level:"หนัก"},
{ text:"ห้ามยิงทีมเดียวกัน", level:"กลาง"},
{ text:"ห้ามขโมยรถหน่วยงาน", level:"กลาง"},
{ text:"ห้ามเข้าเขตหวงห้าม", level:"เบา"},
{ text:"ห้าม AFK ระหว่างฝึก", level:"เบา"},
{ text:"ห้ามใช้ชื่อไม่เหมาะสม", level:"กลาง"},
{ text:"ห้ามแจกข้อมูลส่วนตัว", level:"หนัก"},
{ text:"ห้ามหลอกลวงผู้เล่น", level:"หนัก"},
{ text:"ห้ามใช้ช่องโหว่หนีโทษ", level:"หนัก"},
{ text:"ห้ามทำลายบรรยากาศ RP", level:"กลาง"},
{ text:"ห้ามพูดไม่สุภาพต่อผู้บังคับบัญชา", level:"เบา"},
{ text:"ห้ามเข้ากิจกรรมโดยไม่ได้รับอนุญาต", level:"เบา"},
{ text:"ห้ามป่วนระบบเซิร์ฟเวอร์", level:"หนัก"},
{ text:"ห้ามใช้สคริปต์ช่วยเล่น", level:"หนัก"},
{ text:"ห้ามก่อกวนทีมงาน", level:"กลาง"},
{ text:"คำตัดสินทีมงานถือเป็นสิ้นสุด", level:"กลาง"}

];

const container = document.getElementById("rulesContainer");

rules.forEach((rule,index)=>{

    let className = "";
    let text = "";

    if(rule.level === "เบา"){
        className = "light";
        text = "เตือน";
    }

    else if(rule.level === "กลาง"){
        className = "medium";
        text = "ปลด";
    }

    else{
        className = "heavy";
        text = "แบน";
    }

    container.innerHTML += `

    <div class="rule-card">

        <div class="rule-number">
            ข้อ ${index + 1}
        </div>

        <div class="rule-text">
            ${rule.text}
        </div>

        <div class="punishment ${className}">
            โทษ : ${text}
        </div>

    </div>

    `;

});

function openRules(){
    document.getElementById("rulesPage").classList.add("active");
}

function backHome(){
    document.getElementById("rulesPage").classList.remove("active");
}

</script>

</body>
</html>
