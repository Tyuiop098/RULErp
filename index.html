<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>กฎระเบียบเซิร์ฟเวอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    background:#f8f8f8;
    overflow:hidden;
}

/* หน้าแรก */

.home{
    width:100%;
    height:100vh;
    background:
    linear-gradient(135deg,#ffffff,#fff7ed);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
    position:relative;
}

.top-red{
    position:absolute;
    top:0;
    width:100%;
    height:12px;
    background:#b91c1c;
}

.logo{
    width:140px;
    height:140px;
    border-radius:35px;
    background:linear-gradient(135deg,#b91c1c,#dc2626);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    color:#facc15;
    box-shadow:0 10px 30px rgba(185,28,28,0.3);
    border:5px solid #facc15;
}

.home h1{
    margin-top:30px;
    color:#991b1b;
    font-size:42px;
    font-weight:700;
}

.home p{
    margin-top:12px;
    color:#7f1d1d;
    font-size:18px;
    line-height:1.7;
}

.enter-btn{
    margin-top:35px;
    width:100%;
    max-width:330px;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#b91c1c,#dc2626);
    color:white;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(185,28,28,0.25);
}

.enter-btn:active{
    transform:scale(0.96);
}

/* หน้ากฎ */

.rules-page{
    position:fixed;
    top:0;
    left:100%;
    width:100%;
    height:100vh;
    background:#fffdf8;
    transition:0.5s;
    overflow-y:auto;
}

.rules-page.active{
    left:0;
}

.topbar{
    position:sticky;
    top:0;
    background:white;
    padding:18px;
    display:flex;
    align-items:center;
    gap:15px;
    border-bottom:3px solid #facc15;
    z-index:999;
}

.back-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:14px;
    background:#fef2f2;
    color:#b91c1c;
    font-size:22px;
    cursor:pointer;
    border:2px solid #fecaca;
}

.topbar h2{
    color:#991b1b;
    font-size:24px;
}

.rules-container{
    padding:18px;
}

/* การ์ด */

.rule-card{
    background:white;
    border-radius:24px;
    padding:22px;
    margin-bottom:20px;
    border:2px solid #fef3c7;
    box-shadow:0 5px 18px rgba(0,0,0,0.05);
    transition:0.3s;
}

.rule-card:active{
    transform:scale(0.98);
}

.rule-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.rule-number{
    background:#facc15;
    color:#78350f;
    padding:8px 16px;
    border-radius:12px;
    font-weight:700;
    font-size:18px;
}

.rule-title{
    color:#991b1b;
    font-size:21px;
    font-weight:700;
    margin-bottom:12px;
}

.rule-detail{
    color:#444;
    font-size:16px;
    line-height:1.8;
    margin-bottom:18px;
}

/* โทษ */

.punishment{
    padding:10px 18px;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
}

.light{
    background:#fef3c7;
    color:#92400e;
}

.medium{
    background:#fee2e2;
    color:#991b1b;
}

.heavy{
    background:#b91c1c;
    color:white;
}

</style>
</head>

<body>

<!-- หน้าแรก -->

<div class="home">

    <div class="top-red"></div>

    <div class="logo">
        ⚖️
    </div>

    <h1>SERVER RULES</h1>

    <p>
        กฎระเบียบและบทลงโทษภายในเซิร์ฟเวอร์<br>
        กรุณาศึกษาก่อนเข้าเล่น
    </p>

    <button class="enter-btn" onclick="openRules()">
        ดูกฎระเบียบในแมพ
    </button>

</div>

<!-- หน้ากฎ -->

<div class="rules-page" id="rulesPage">

    <div class="topbar">

        <button class="back-btn" onclick="closeRules()">
            ←
        </button>

        <h2>กฎระเบียบเซิร์ฟเวอร์</h2>

    </div>

    <div class="rules-container" id="rulesContainer"></div>

</div>

<script>

const rules = [

{
title:"ห้ามใช้คำหยาบรุนแรงใส่ผู้อื่น",
detail:"ห้ามด่าทอ ดูถูก หรือใช้คำพูดไม่เหมาะสมใส่ผู้เล่นคนอื่น หากมีการกระทำซ้ำหลายครั้ง ทีมงานสามารถเพิ่มโทษได้",
level:"เบา"
},

{
title:"ห้ามสแปมข้อความหรือคำสั่งในแชท",
detail:"ห้ามส่งข้อความซ้ำๆ หรือใช้คำสั่งจำนวนมากจนรบกวนผู้เล่นในเซิร์ฟเวอร์",
level:"เบา"
},

{
title:"ห้ามเปิดไมค์ก่อกวน",
detail:"ห้ามเปิดเพลง เสียงดัง หรือเสียงแตกผ่านไมโครโฟนจนรบกวนผู้อื่น",
level:"เบา"
},

{
title:"ห้ามแต่งชุดผิดหน่วยหรือผิดยศ",
detail:"ผู้เล่นต้องแต่งกายให้ตรงกับยศ หน่วย หรือหน้าที่ของตนเอง",
level:"เบา"
},

{
title:"ห้ามใช้อาวุธใน Safe Zone",
detail:"พื้นที่ปลอดภัยห้ามยิง ต่อสู้ หรือใช้อาวุธทุกชนิดโดยเด็ดขาด",
level:"กลาง"
},

{
title:"ห้ามยิงมั่วโดยไม่มีเหตุผล",
detail:"ห้ามโจมตีผู้เล่นโดยไม่มีเหตุ RP หรือไม่มีสถานการณ์รองรับ",
level:"กลาง"
},

{
title:"ห้ามใช้โปรแกรมโกงหรือสคริปต์โกง",
detail:"ห้ามใช้ Hack Executor หรือโปรแกรมช่วยเล่นทุกประเภท หากตรวจพบจะถูกลงโทษทันที",
level:"หนัก"
},

{
title:"ห้ามปลอมตัวเป็นแอดมินหรือทีมงาน",
detail:"ห้ามแอบอ้างเป็นทีมงานเพื่อหลอกลวงหรือสั่งการผู้เล่น",
level:"หนัก"
},

{
title:"ห้ามก่อกวนการฝึก",
detail:"ห้ามเดินตัดแถว เปิดเสียง หรือกระทำการที่ทำให้การฝึกเสียหาย",
level:"กลาง"
},

{
title:"คำตัดสินของทีมงานถือเป็นสิ้นสุด",
detail:"ผู้เล่นทุกคนต้องเคารพการตัดสินของทีมงานตามหลักฐานและสถานการณ์",
level:"กลาง"
}

];

const container = document.getElementById("rulesContainer");

rules.forEach((rule,index)=>{

let className = "";
let punishmentText = "";

if(rule.level === "เบา"){
    className = "light";
    punishmentText = "🟡 เตือน";
}

else if(rule.level === "กลาง"){
    className = "medium";
    punishmentText = "🟠 ปลด";
}

else{
    className = "heavy";
    punishmentText = "🔴 แบน";
}

container.innerHTML += `

<div class="rule-card">

    <div class="rule-header">

        <div class="rule-number">
            ข้อ ${index + 1}
        </div>

        <div class="punishment ${className}">
            ${punishmentText}
        </div>

    </div>

    <div class="rule-title">
        ${rule.title}
    </div>

    <div class="rule-detail">
        ${rule.detail}
    </div>

</div>

`;

});

function openRules(){
    document.getElementById("rulesPage").classList.add("active");
}

function closeRules(){
    document.getElementById("rulesPage").classList.remove("active");
}

</script>

</body>
</html>
